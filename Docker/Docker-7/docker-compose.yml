version: "3.8"

services:
  app:
    build: .
    container_name: ecommerce-app

    ports:
      - "3000:3000"

    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: ivolve

    depends_on:
      - db

    volumes:
      - ./logs:/app/logs

    restart: unless-stopped

  db:
    image: mysql:8.0

    container_name: mysql-db

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ivolve

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
